name: Auto Update Live Sources

on:
  schedule:
    - cron: '30 0 * * *' # 每天北京时间早上 8 点30自动运行
  workflow_dispatch:      # 允许你手动点击运行按钮

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 安装 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装依赖库
        run: pip install requests

      - name: 执行爬虫脚本
        run: python update_m3u.py

      - name: 提交更新到仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add 2b.m3u
          git commit -m "自动更新：同步 [BD] 高清源并保留分组" || echo "没有内容变化"
          git push
